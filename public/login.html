<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — NoPortuguese</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --surface2: #1a1a24;
      --border: #222230; --accent: #7c5cfc; --text: #f0f0f8;
      --muted: #6b6b80; --error: #f87171;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .logo { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; margin-bottom: 2rem; }
    .logo span { color: var(--accent); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 100%; max-width: 400px; }
    .card h2 { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; margin-bottom: 0.3rem; }
    .card p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.8rem; }
    .field { margin-bottom: 1rem; }
    label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--muted); margin-bottom: 0.4rem; }
    input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; color: var(--text); font-size: 0.95rem; font-family: inherit; transition: border-color .2s; }
    input:focus { outline: none; border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    .btn { width: 100%; background: var(--accent); color: #fff; border: none; padding: 0.9rem; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity .2s; margin-top: 0.5rem; }
    .btn:hover:not(:disabled) { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { font-size: 0.82rem; margin-top: 0.8rem; text-align: center; min-height: 1.2rem; color: var(--error); }
  </style>
</head>
<body>
  <div class="logo">No<span>Portuguese</span></div>
  <div class="card">
    <h2>Bem-vindo de volta</h2>
    <p>Entre com seu e-mail e senha</p>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="email@exemplo.com" />
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="Sua senha" onkeydown="if(event.key==='Enter')entrar()" />
    </div>
    <div class="msg" id="msg"></div>
    <button class="btn" id="btn" onclick="entrar()">Entrar →</button>
  </div>

  <script>
    async function entrar() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const msg   = document.getElementById('msg');
      const btn   = document.getElementById('btn');

      msg.textContent = '';
      if (!email || !senha) { msg.textContent = 'Preencha e-mail e senha.'; return; }

      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha }),
        });
        const data = await res.json();

        if (!res.ok) {
          msg.textContent = data.error || 'Erro ao entrar.';
          btn.disabled = false;
          btn.textContent = 'Entrar →';
          return;
        }

        sessionStorage.setItem('np_token', data.access_token);
        sessionStorage.setItem('np_user',  JSON.stringify(data.usuario));
        location.href = data.redirect;

      } catch (e) {
        msg.textContent = 'Erro de conexão. Tente novamente.';
        btn.disabled = false;
        btn.textContent = 'Entrar →';
      }
    }
  </script>
</body>
</html>
